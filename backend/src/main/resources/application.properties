spring.application.name=ecommerce

# MySQL connection (Railway variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${MYSQL_HOST}}:${MYSQLPORT:${MYSQL_PORT}}/${MYSQLDATABASE:${MYSQL_DATABASE}}
spring.datasource.username=${MYSQLUSER:${MYSQL_USER}}
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Railway dynamic port
server.port=${PORT:8080}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB